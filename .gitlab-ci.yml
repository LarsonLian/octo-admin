variables:
  APP_NAME: octo-admin-web
  REPOSITORY: tbj7-xtiao-tcr1.tencentcloudcr.com
  CONTAINER_IMAGE: ${REPOSITORY}/dmwork/${APP_NAME}

stages:
  - build
  - package
  - sync
  - deploy
  - notify

# ── build：MR 时做类型检查 ────────────────────────────────────────────────────
type-check:
  stage: build
  image: ${REPOSITORY}/xtiao-release/node:18-alpine
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  script:
    - npm ci
    - npx tsc --noEmit

# ── package：构建并推送镜像 ───────────────────────────────────────────────────
.package_base: &package_base
  stage: package
  image: docker:24
  services:
    - docker:24-dind
  before_script:
    - docker login ${REPOSITORY} -u 100028731872 -p ${HARBOR_PWD}

package:dev:
  <<: *package_base
  rules:
    - if: $CI_COMMIT_BRANCH == "develop"
  variables:
    IMAGE_TAG: dev-${CI_PIPELINE_ID}
  script:
    - docker build -f Dockerfile.ci -t ${CONTAINER_IMAGE}:${IMAGE_TAG} .
    - docker push ${CONTAINER_IMAGE}:${IMAGE_TAG}

package:test:
  <<: *package_base
  rules:
    - if: $CI_COMMIT_BRANCH == "test"
  variables:
    IMAGE_TAG: test-${CI_PIPELINE_ID}
  script:
    - docker build -f Dockerfile.ci -t ${CONTAINER_IMAGE}:${IMAGE_TAG} .
    - docker push ${CONTAINER_IMAGE}:${IMAGE_TAG}

package:prod:
  <<: *package_base
  rules:
    - if: $CI_COMMIT_TAG
  variables:
    IMAGE_TAG: ${CI_COMMIT_TAG}
  script:
    - docker build -f Dockerfile.ci -t ${CONTAINER_IMAGE}:${IMAGE_TAG} .
    - docker push ${CONTAINER_IMAGE}:${IMAGE_TAG}

# ── sync：渲染 manifest 推送到 deploy-files ──────────────────────────────────
.sync_base: &sync_base
  stage: sync
  image: ${REPOSITORY}/xtiao-release/alpine:3.19
  before_script:
    - apk add --no-cache git
    - git config --global user.email "ci@mlamp.cn"
    - git config --global user.name "GitLab CI"

sync:dev:
  <<: *sync_base
  rules:
    - if: $CI_COMMIT_BRANCH == "develop"
  variables:
    IMAGE_TAG: dev-${CI_PIPELINE_ID}
    DEPLOY_BRANCH: ${APP_NAME}-dev
  script:
    - git clone https://__token__:${CODE_TOKEN}@code.mlamp.cn/dm-fa/infra/deploy-files.git deploy-files
    - cd deploy-files
    - git checkout ${DEPLOY_BRANCH} 2>/dev/null || git checkout -b ${DEPLOY_BRANCH}
    - mkdir -p manifests
    - sed -e "s|{{BRANCH}}|dev|g" -e "s|{{REPO_URL}}|${CONTAINER_IMAGE}|g" -e "s|{{IMAGE_TAG}}|${IMAGE_TAG}|g" ../manifests/deploy.yaml > manifests/deploy.yaml
    - git add manifests/deploy.yaml
    - 'git diff --cached --quiet || git commit -m "deploy: ${APP_NAME} dev ${IMAGE_TAG}"'
    - git push origin ${DEPLOY_BRANCH}

sync:test:
  <<: *sync_base
  rules:
    - if: $CI_COMMIT_BRANCH == "test"
  variables:
    IMAGE_TAG: test-${CI_PIPELINE_ID}
    DEPLOY_BRANCH: ${APP_NAME}-test
  script:
    - git clone https://__token__:${CODE_TOKEN}@code.mlamp.cn/dm-fa/infra/deploy-files.git deploy-files
    - cd deploy-files
    - git checkout ${DEPLOY_BRANCH} 2>/dev/null || git checkout -b ${DEPLOY_BRANCH}
    - mkdir -p manifests
    - sed -e "s|{{BRANCH}}|test|g" -e "s|{{REPO_URL}}|${CONTAINER_IMAGE}|g" -e "s|{{IMAGE_TAG}}|${IMAGE_TAG}|g" ../manifests/deploy.yaml > manifests/deploy.yaml
    - git add manifests/deploy.yaml
    - 'git diff --cached --quiet || git commit -m "deploy: ${APP_NAME} test ${IMAGE_TAG}"'
    - git push origin ${DEPLOY_BRANCH}

sync:prod:
  <<: *sync_base
  rules:
    - if: $CI_COMMIT_TAG
  variables:
    IMAGE_TAG: ${CI_COMMIT_TAG}
    DEPLOY_BRANCH: ${APP_NAME}-prod
  script:
    - git clone https://__token__:${CODE_TOKEN}@code.mlamp.cn/dm-fa/infra/deploy-files.git deploy-files
    - cd deploy-files
    - git checkout ${DEPLOY_BRANCH} 2>/dev/null || git checkout -b ${DEPLOY_BRANCH}
    - mkdir -p manifests
    - sed -e "s|{{BRANCH}}|prod|g" -e "s|{{REPO_URL}}|${CONTAINER_IMAGE}|g" -e "s|{{IMAGE_TAG}}|${IMAGE_TAG}|g" ../manifests/deploy.yaml > manifests/deploy.yaml
    - git add manifests/deploy.yaml
    - 'git diff --cached --quiet || git commit -m "deploy: ${APP_NAME} prod ${IMAGE_TAG}"'
    - git push origin ${DEPLOY_BRANCH}

# ── deploy：触发 ArgoCD 同步（prod 手动）────────────────────────────────────
.deploy_base: &deploy_base
  stage: deploy
  image: ${REPOSITORY}/xtiao-release/alpine:3.19
  before_script:
    - apk add --no-cache curl

deploy:dev:
  <<: *deploy_base
  rules:
    - if: $CI_COMMIT_BRANCH == "develop"
  script:
    - |
      curl -sf -X POST https://argocd.mlamp.cn/api/v1/applications/${APP_NAME}-dev/sync \
        -H "Authorization: Bearer ${ARGOCD_TOKEN}" \
        -H "Content-Type: application/json" \
        -d '{}'

deploy:test:
  <<: *deploy_base
  rules:
    - if: $CI_COMMIT_BRANCH == "test"
  script:
    - |
      curl -sf -X POST https://argocd.mlamp.cn/api/v1/applications/${APP_NAME}-test/sync \
        -H "Authorization: Bearer ${ARGOCD_TOKEN}" \
        -H "Content-Type: application/json" \
        -d '{}'

# ── notify：企微通知 ──────────────────────────────────────────────────────────
.notify_base: &notify_base
  stage: notify
  image: ${REPOSITORY}/xtiao-release/alpine:3.19
  before_script:
    - apk add --no-cache curl

notify:dev:
  <<: *notify_base
  rules:
    - if: $CI_COMMIT_BRANCH == "develop"
  script:
    - |
      curl -sf -X POST "${WECOM_WEBHOOK}" \
        -H "Content-Type: application/json" \
        -d "{\"msgtype\":\"text\",\"text\":{\"content\":\"[${APP_NAME}] dev 部署完成\npipeline: ${CI_PIPELINE_URL}\ncommit: ${CI_COMMIT_SHORT_SHA} ${CI_COMMIT_MESSAGE}\"}}"

notify:test:
  <<: *notify_base
  rules:
    - if: $CI_COMMIT_BRANCH == "test"
  script:
    - |
      curl -sf -X POST "${WECOM_WEBHOOK}" \
        -H "Content-Type: application/json" \
        -d "{\"msgtype\":\"text\",\"text\":{\"content\":\"[${APP_NAME}] test 部署完成\npipeline: ${CI_PIPELINE_URL}\ncommit: ${CI_COMMIT_SHORT_SHA} ${CI_COMMIT_MESSAGE}\"}}"

notify:prod:
  <<: *notify_base
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - |
      curl -sf -X POST "${WECOM_WEBHOOK}" \
        -H "Content-Type: application/json" \
        -d "{\"msgtype\":\"text\",\"text\":{\"content\":\"[${APP_NAME}] prod 镜像已推送，tag: ${CI_COMMIT_TAG}\n请在 ArgoCD 手动同步\npipeline: ${CI_PIPELINE_URL}\"}}"
