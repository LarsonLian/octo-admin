variables:
  APP_NAME: octo-admin-web
  REPOSITORY: tbj7-xtiao-tcr1.tencentcloudcr.com
  CONTAINER_IMAGE: ${REPOSITORY}/dmwork/${APP_NAME}

stages:
  - build
  - package
  - sync
  - deploy
  - notify

# ── build：MR 时做类型检查 ────────────────────────────────────────────────────
type-check:
  stage: build
  tags:
    - tke-deepmining-runner
  only:
    - merge_requests
  image: ${REPOSITORY}/xtiao-release/node:18-alpine
  script:
    - npm ci
    - npx tsc --noEmit

# ── package：构建并推送镜像 ───────────────────────────────────────────────────
.package_base: &package_base
  stage: package
  tags:
    - tke-deepmining-runner
  image: ${REPOSITORY}/xtiao-release/docker:20.10.17
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - i=0; while [ "$i" -lt 12 ]; do docker info && break; sleep 5; i=$(( i + 1 )); done
    - echo "$HARBOR_PWD" | docker login $REPOSITORY -u 100028731872 --password-stdin

package:dev:
  <<: *package_base
  only:
    - develop
  variables:
    IMAGE_TAG: dev-${CI_PIPELINE_ID}
  script:
    - docker build -f Dockerfile.ci -t ${CONTAINER_IMAGE}:${IMAGE_TAG} -t ${CONTAINER_IMAGE}:dev-latest .
    - docker push ${CONTAINER_IMAGE}:${IMAGE_TAG}
    - docker push ${CONTAINER_IMAGE}:dev-latest

package:test:
  <<: *package_base
  only:
    - test
  variables:
    IMAGE_TAG: test-${CI_PIPELINE_ID}
  script:
    - docker build -f Dockerfile.ci -t ${CONTAINER_IMAGE}:${IMAGE_TAG} -t ${CONTAINER_IMAGE}:test-latest .
    - docker push ${CONTAINER_IMAGE}:${IMAGE_TAG}
    - docker push ${CONTAINER_IMAGE}:test-latest

package:prod:
  <<: *package_base
  only:
    - tags
  variables:
    IMAGE_TAG: ${CI_COMMIT_TAG}
  script:
    - docker build -f Dockerfile.ci -t ${CONTAINER_IMAGE}:${IMAGE_TAG} -t ${CONTAINER_IMAGE}:latest .
    - docker push ${CONTAINER_IMAGE}:${IMAGE_TAG}
    - docker push ${CONTAINER_IMAGE}:latest

# ── sync：渲染 manifest 推送到 deploy-files ──────────────────────────────────
sync_code:
  stage: sync
  tags:
    - tke-deepmining-runner
  only:
    - develop
    - test
    - tags
  image: ${REPOSITORY}/xtiao-release/alpine/git:v2.30.2
  variables:
    GIT_STRATEGY: clone
    GIT_DEPTH: 1
  script:
    - git config --global user.email "ci@mlamp.cn"
    - git config --global user.name "GitLab CI"
    - |
      set -e

      if [[ -n "$CI_COMMIT_TAG" ]]; then
        DEPLOY_ENV="prod"
        IMAGE_TAG="$CI_COMMIT_TAG"
      elif [[ "$CI_COMMIT_REF_NAME" == "test" ]]; then
        DEPLOY_ENV="test"
        IMAGE_TAG="test-${CI_PIPELINE_ID}"
      else
        DEPLOY_ENV="dev"
        IMAGE_TAG="dev-${CI_PIPELINE_ID}"
      fi

      TARGET_BRANCH="$APP_NAME-$DEPLOY_ENV"
      echo "Env: $DEPLOY_ENV → Branch: $TARGET_BRANCH → Tag: $IMAGE_TAG"

      DEPLOY_DIR="deploy-repo"
      if git clone -b $TARGET_BRANCH --depth 1 --single-branch https://__token__:$CODE_TOKEN@code.mlamp.cn/dm-fa/infra/deploy-files.git $DEPLOY_DIR; then
        echo "Branch $TARGET_BRANCH exists"
      else
        git clone --depth 1 https://__token__:$CODE_TOKEN@code.mlamp.cn/dm-fa/infra/deploy-files.git $DEPLOY_DIR
        cd $DEPLOY_DIR && git checkout -b $TARGET_BRANCH && cd ..
      fi

      mkdir -p $DEPLOY_DIR/manifests
      cp manifests/deploy.yaml $DEPLOY_DIR/manifests/deploy.yaml

      cd $DEPLOY_DIR
      sed -i "s|{{BRANCH}}|${DEPLOY_ENV}|g" manifests/deploy.yaml
      sed -i "s|{{REPO_URL}}|${CONTAINER_IMAGE}|g" manifests/deploy.yaml
      sed -i "s|{{IMAGE_TAG}}|${IMAGE_TAG}|g" manifests/deploy.yaml

      git add manifests/deploy.yaml
      if git diff --cached --quiet; then
        echo "No changes, skipping commit"
        exit 0
      fi
      git commit -m "deploy: ${APP_NAME} ${DEPLOY_ENV} ${IMAGE_TAG}"
      git push --force https://__token__:$CODE_TOKEN@code.mlamp.cn/dm-fa/infra/deploy-files.git HEAD:$TARGET_BRANCH

# ── deploy：触发 ArgoCD 同步（prod 跳过，手动）──────────────────────────────
argocd_sync:
  stage: deploy
  tags:
    - tke-deepmining-runner
  only:
    - develop
    - test
    - tags
  image: ${REPOSITORY}/xtiao-release/alpine/curl:8.11.1
  variables:
    GIT_STRATEGY: none
    ARGOCD_SERVER: argocd-server.argocd:80
  script: |
    set -e
    if [[ -n "$CI_COMMIT_TAG" ]]; then
      echo "Tag build: skipping auto ArgoCD sync for prod (manual approval required)"
      exit 0
    elif [[ "$CI_COMMIT_REF_NAME" == "test" ]]; then
      ARGOCD_APP="${APP_NAME}-test"
    else
      ARGOCD_APP="${APP_NAME}-dev"
    fi
    echo "Syncing ArgoCD app: $ARGOCD_APP"
    SYNC_RESP=$(curl -s -w "\n%{http_code}" -X POST \
      "http://$ARGOCD_SERVER/api/v1/applications/$ARGOCD_APP/sync" \
      -H "Authorization: Bearer $ARGOCD_TOKEN" \
      -H "Content-Type: application/json" \
      -d '{"prune":false,"dryRun":false}')
    HTTP_CODE=$(echo "$SYNC_RESP" | tail -1)
    if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "204" ]; then
      echo "ArgoCD sync failed with HTTP $HTTP_CODE"
      exit 1
    fi
    echo "ArgoCD sync triggered (app: $ARGOCD_APP)"

# ── notify ────────────────────────────────────────────────────────────────────
.notify_base: &notify_base
  stage: notify
  tags:
    - tke-deepmining-runner
  only:
    - develop
    - test
    - tags
  image: ${REPOSITORY}/xtiao-release/alpine/curl:8.11.1
  variables:
    GIT_STRATEGY: none

notify-success:
  <<: *notify_base
  when: on_success
  script: |
    if [[ -n "$CI_COMMIT_TAG" ]]; then
      ENV_LABEL="Prod"; IMAGE_TAG="${CONTAINER_IMAGE}:${CI_COMMIT_TAG}"
      MESSAGE="[${APP_NAME}] prod 镜像已推送，tag: ${CI_COMMIT_TAG}\n请在 ArgoCD 手动同步\npipeline: ${CI_PIPELINE_URL}"
    elif [[ "$CI_COMMIT_REF_NAME" == "test" ]]; then
      ENV_LABEL="Test"; IMAGE_TAG="${CONTAINER_IMAGE}:test-${CI_PIPELINE_ID}"
      MESSAGE="[${APP_NAME}] test 部署完成\npipeline: ${CI_PIPELINE_URL}\ncommit: ${CI_COMMIT_SHORT_SHA} ${CI_COMMIT_MESSAGE}"
    else
      ENV_LABEL="Dev"; IMAGE_TAG="${CONTAINER_IMAGE}:dev-${CI_PIPELINE_ID}"
      MESSAGE="[${APP_NAME}] dev 部署完成\npipeline: ${CI_PIPELINE_URL}\ncommit: ${CI_COMMIT_SHORT_SHA} ${CI_COMMIT_MESSAGE}"
    fi
    if [[ -n "$WECOM_WEBHOOK" ]]; then
      curl -s -X POST "$WECOM_WEBHOOK" \
        -H "Content-Type: application/json" \
        -d "{\"msgtype\":\"text\",\"text\":{\"content\":\"$(echo -e $MESSAGE)\"}}"
    fi

notify-fail:
  <<: *notify_base
  when: on_failure
  script: |
    if [[ -n "$CI_COMMIT_TAG" ]]; then
      MESSAGE="[${APP_NAME}] prod 构建失败，tag: ${CI_COMMIT_TAG}\npipeline: ${CI_PIPELINE_URL}"
    elif [[ "$CI_COMMIT_REF_NAME" == "test" ]]; then
      MESSAGE="[${APP_NAME}] test 构建失败\npipeline: ${CI_PIPELINE_URL}\ncommit: ${CI_COMMIT_SHORT_SHA}"
    else
      MESSAGE="[${APP_NAME}] dev 构建失败\npipeline: ${CI_PIPELINE_URL}\ncommit: ${CI_COMMIT_SHORT_SHA}"
    fi
    if [[ -n "$WECOM_WEBHOOK" ]]; then
      curl -s -X POST "$WECOM_WEBHOOK" \
        -H "Content-Type: application/json" \
        -d "{\"msgtype\":\"text\",\"text\":{\"content\":\"$(echo -e $MESSAGE)\"}}"
    fi
